server:
  port: 8081

spring:
  application:
    name: customer-service
  datasource:
    url: jdbc:h2:mem:customerdb
    driver-class-name: org.h2.Driver
    username: postgres
    password: rwanda
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  h2:
    console:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

app:
  jwt:
    secret: "myMonolithSecretKeyThatShouldBeExternalizedInMicroservices2024FoodDelivery!"
    expiration-ms: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info
