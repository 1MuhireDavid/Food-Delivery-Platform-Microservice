version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: food-delivery-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rwanda}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - food-delivery-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: food-delivery-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - food-delivery-net

  eureka:
    build:
      context: infrastructure/service-registry
    container_name: food-delivery-eureka
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD-SHELL", "wget -q http://localhost:8761/actuator/health -O /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - food-delivery-net

  api-gateway:
    build:
      context: infrastructure/api-gateway
    container_name: food-delivery-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET:-myMonolithSecretKeyThatShouldBeExternalizedInMicroservices2024FoodDelivery!}
      EUREKA_URI: http://eureka:8761/eureka/
    depends_on:
      eureka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q http://localhost:8080/actuator/health -O /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - food-delivery-net

  customer-service:
    build:
      context: services/customer-service
    container_name: food-delivery-customer
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET:-myMonolithSecretKeyThatShouldBeExternalizedInMicroservices2024FoodDelivery!}
      EUREKA_URI: http://eureka:8761/eureka/
      DB_URL: jdbc:postgresql://postgres:5432/customer_db
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-rwanda}
    depends_on:
      eureka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q http://localhost:8081/actuator/health -O /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - food-delivery-net

  restaurant-service:
    build:
      context: services/restaurant-service
    container_name: food-delivery-restaurant
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_URI: http://eureka:8761/eureka/
      DB_URL: jdbc:postgresql://postgres:5432/restaurant_db
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-rwanda}
    depends_on:
      eureka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q http://localhost:8082/actuator/health -O /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - food-delivery-net

  order-service:
    build:
      context: services/order-service
    container_name: food-delivery-order
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_URI: http://eureka:8761/eureka/
      DB_URL: jdbc:postgresql://postgres:5432/order_db
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-rwanda}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
    depends_on:
      eureka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q http://localhost:8083/actuator/health -O /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - food-delivery-net

  delivery-service:
    build:
      context: services/delivery-service
    container_name: food-delivery-delivery
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_URI: http://eureka:8761/eureka/
      DB_URL: jdbc:postgresql://postgres:5432/delivery_db
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-rwanda}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
    depends_on:
      eureka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q http://localhost:8084/actuator/health -O /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - food-delivery-net

networks:
  food-delivery-net:
    driver: bridge

volumes:
  postgres_data:
